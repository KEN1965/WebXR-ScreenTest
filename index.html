<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>WebXR Screen Test</title>

  <link rel="stylesheet" href="style.css?v0.0.4.21" />
</head>

<body>

  <!-- WebXR描画用canvas -->
  <canvas id="xr-canvas"></canvas>

  <!-- AR開始前だけ表示 -->
  <button id="start-ar">
    AR開始
  </button>

  <!-- バージョン表示 -->
  <div id="version-label">
    v0.0.4.21
  </div>

  <!-- AR開始後に表示するUI -->
<div id="ui">

  <!-- =========================
       縦画面専用UI
  ========================== -->
  <div id="portrait-ui">

    <div class="status-panel">
      <div class="orientation-label">portrait</div>
      <div class="distance-label">-- m</div>
    </div>

    <div class="guide">
      スマホをゆっくり動かして<br>
      床を認識させます
    </div>

    <div class="portrait-action-area">
      <div class="portrait-buttons">
        <button class="ai-btn">AI</button>
        <button class="capture-btn" aria-label="撮影"></button>
      </div>
    </div>

  </div>


  <!-- =========================
       横画面専用UI
  ========================== -->
  <div id="landscape-ui">

    <div class="status-panel">
      <div class="orientation-label">landscape</div>
      <div class="distance-label">-- m</div>
    </div>

    <div class="guide">
      スマホをゆっくり動かして<br>
      床を認識させます
    </div>

    <div class="landscape-action-area">
      <button class="capture-btn" aria-label="撮影"></button>
      <button class="ai-btn">AI</button>
    </div>

  </div>

</div>

  <script
    type="module"
    src="main.js?v0.0.4.21"
  ></script>

</body>
</html>
