<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebXR Screen Test</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- WebXR開始ボタン -->
  <button id="start-ar">
    AR開始
  </button>

  <!-- WebXR DOM Overlay UI -->
  <div id="ui">

    <!-- 左側ボタン -->
    <button id="menu-btn">
      メニュー
    </button>

    <!-- 右側ボタン群 -->
    <div id="right-buttons">

      <button id="capture-btn">
        撮影
      </button>

      <button id="save-btn">
        保存
      </button>

    </div>

    <!-- デバッグ表示 -->
    <div id="debug-orientation">
      orientation
    </div>

  </div>

  <script type="module" src="main.js"></script>

</body>
</html>
