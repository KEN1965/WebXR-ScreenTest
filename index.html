<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>WebXR Screen Test</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main id="fallback">
    <h1>WebXR Screen Test</h1>
    <p>Android Chrome で開き、「ARを開始」を押してください。</p>
    <p class="note">WebXR AR は HTTPS または localhost が必要です。</p>
    <button id="start-ar">ARを開始</button>
    <p id="status">初期化中...</p>
  </main>

  <!-- DOM Overlay: WebXR中に画面上へ重ねるUI -->
  <div id="xr-ui" class="hidden">
    <div id="top-bar">
      <button id="close-ar" type="button">終了</button>
      <span id="orientation-label">orientation: -</span>
    </div>

    <button id="primary-action" type="button">撮影</button>
    <button id="secondary-action" type="button">切替</button>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
