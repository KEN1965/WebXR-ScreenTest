<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebXR Screen Test</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- WebXR描画用canvas -->
  <canvas id="xr-canvas"></canvas>

  <button id="start-ar">
    AR開始
  </button>
  <!-- バージョン表示 -->
  <div id="version-label">
    v0.0.4.11
  </div>

<div id="ui">

  <!-- 左上：向き + 距離 -->
  <div id="status-panel">
    <div id="debug-orientation">portrait</div>
    <div id="distance-label">-- m</div>
  </div>

  <!-- 中央：床認識ガイド -->
  <div id="guide">
    スマホをゆっくり動かして床を認識させます
  </div>

  <!-- ボタンエリア -->
  <div id="action-buttons">
    <button id="ai-btn">AI</button>
    <button id="capture-btn" aria-label="撮影"></button>
  </div>

</div>

    <div id="debug-orientation">
      orientation
    </div>

  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
